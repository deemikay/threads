<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads: Weave Calculator</title>
  <style>
    body {
      font-family: sans-serif;
      font-size: 18px;
      padding: 20px;
      margin: 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    input {
      width: 4ch;
      margin: 5px;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
    }
    .pair {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bar {
      font-weight: bold;
      font-size: 20px;
      color: #444;
    }
    .clear-button {
      font-size: 18px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 0 6px;
    }
    h2 {
      font-size: 24px;
      text-align: center;
    }
    .section-label {
      font-weight: bold;
      margin-top: 25px;
      margin-bottom: 10px;
      text-align: center;
    }
    #results table {
      width: 100%;
      border-collapse: collapse;
      margin-left: 1em;
    }
    #results td {
      padding: 4px 8px;
      vertical-align: top;
    }

    /* NEW: Required Weight colour states */
    .req-red {
      color: #b30000;
      font-weight: bold;
    }
    .req-black {
      color: #000000;
      font-weight: bold;
    }
    .req-green {
      color: #0a7a0a;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Weave Calculator</h2>

  <div id="results">
    <table>
      <tr>
        <td>Weave Tension:</td>
        <td id="tension-value">-</td>
        <td></td>
      </tr>

      <tr>
        <td>Weave Weight:</td>
        <td id="weight-value">-</td>
        <td></td>
      </tr>

      <tr id="required-row">
        <td>Required Weight:</td>
        <td id="required-weight">-</td>
        <td id="required-note"></td>
      </tr>
    </table>
  </div>

  <!-- CLIMATE SECTION -->
  <div class="section-label">Climate</div>
  <div class="pair">
    <input type="number" id="climate-x">
    <span class="bar">|</span>
    <input type="number" id="climate-y">
    <button class="clear-button" onclick="clearClimate()">&times;</button>
  </div>

  <!-- WEAVE HEADER -->
  <div class="section-label">Weave</div>

  <!-- THREADS SECTION -->
  <div id="pairs"></div>

  <script>
    const pairContainer = document.getElementById('pairs');
    const MAX_THREADS = 9;

    function createThreadRow(i) {
      const div = document.createElement('div');
      div.className = 'pair';
      div.id = `row${i}`;
      div.style.display = i === 0 ? "flex" : "none";

      div.innerHTML = `
        <input type="number" id="x${i}">
        <span class="bar">|</span>
        <input type="number" id="y${i}">
        <button class="clear-button" onclick="clearPair(${i})">&times;</button>
      `;

      pairContainer.appendChild(div);
    }

    for (let i = 0; i < MAX_THREADS; i++) {
      createThreadRow(i);
    }

    function revealNextRow() {
      for (let i = 0; i < MAX_THREADS - 1; i++) {
        const x = document.getElementById(`x${i}`).value;
        const y = document.getElementById(`y${i}`).value;

        if ((x !== "" || y !== "") && document.getElementById(`row${i+1}`).style.display === "none") {
          document.getElementById(`row${i+1}`).style.display = "flex";
          break;
        }
      }
    }

    function updateResults() {
      revealNextRow();

      let fibres = 0;
      let snags = 0;
      let threadWeights = [];

      // Climate
      const cx = parseFloat(document.getElementById("climate-x").value);
      const cy = parseFloat(document.getElementById("climate-y").value);
      if (!isNaN(cx)) fibres += cx;
      if (!isNaN(cy)) snags += cy;

      // Threads
      for (let i = 0; i < MAX_THREADS; i++) {
        const x = parseFloat(document.getElementById(`x${i}`).value);
        const y = parseFloat(document.getElementById(`y${i}`).value);

        let f = 0, s = 0;
        if (!isNaN(x)) f += x;
        if (!isNaN(y)) s += y;

        if (f + s > 0) {
          threadWeights.push(f + s);
          fibres += f;
          snags += s;
        }
      }

      const weaveTension = fibres - snags;
      const weaveWeight = fibres + snags;

      document.getElementById("tension-value").textContent =
        fibres + snags > 0 ? weaveTension : "-";

      document.getElementById("weight-value").textContent =
        fibres + snags > 0 ? weaveWeight : "-";

      if (threadWeights.length === 0) {
        document.getElementById("required-weight").textContent = "-";
        document.getElementById("required-note").textContent = "";
        return;
      }

      threadWeights.sort((a, b) => b - a);

      const count = threadWeights.length;
      let required = 0;

      if (count <= 3) {
        required = 2 * threadWeights[0];
      } else if (count <= 6) {
        required = 2 * (threadWeights[0] + threadWeights[1]);
      } else {
        required = 2 * (threadWeights[0] + threadWeights[1] + threadWeights[2]);
      }

      document.getElementById("required-weight").textContent = required;

      // COLOUR CODING LOGIC
      const row = document.getElementById("required-row");
      row.classList.remove("req-red", "req-black", "req-green");

      if (required > weaveWeight) {
        row.classList.add("req-red");
      } else if (required === weaveWeight) {
        row.classList.add("req-black");
      } else {
        row.classList.add("req-green");
      }
    }

    function clearPair(i) {
      document.getElementById(`x${i}`).value = "";
      document.getElementById(`y${i}`).value = "";
      updateResults();
    }

    function clearClimate() {
      document.getElementById("climate-x").value = "";
      document.getElementById("climate-y").value = "";
      updateResults();
    }

    document.addEventListener('input', updateResults);
  </script>
</body>
</html>
