<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads: Weave Calculator</title>
  <style>
    body {
      font-family: sans-serif;
      font-size: 18px;
      padding: 20px;
      margin: 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    input {
      width: 4ch;
      margin: 5px;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
    }
    .pair {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bar {
      font-weight: bold;
      font-size: 20px;
      color: #444;
    }
    .clear-button {
      font-size: 18px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 0 6px;
    }
    h2 {
      font-size: 24px;
      text-align: center;
    }
    .section-label {
      font-weight: bold;
      margin-top: 25px;
      margin-bottom: 10px;
      text-align: center;
    }
    #results table {
      width: 100%;
      border-collapse: collapse;
      margin-left: 1em;
    }
    #results td {
      padding: 4px 8px;
      vertical-align: top;
    }

    /* Required Weight colour states */
    .req-red {
      color: #b30000;
      font-weight: bold;
    }
    .req-black {
      color: #000000;
      font-weight: bold;
    }
    .req-green {
      color: #0a7a0a;
      font-weight: bold;
    }

    /* Surplus/Shortfall box */
    #outcome-box {
      margin-top: 20px;
      margin-left: 1em;
      white-space: pre-line;
      text-align: center;
    }

    /* NEW: highlight heaviest threads */
    .heaviest {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <h2>Weave Calculator</h2>

  <div id="results">
    <table>
      <tr>
        <td>Weave Tension:</td>
        <td id="tension-value">-</td>
        <td></td>
      </tr>

      <tr>
        <td>Weave Weight:</td>
        <td id="weight-value">-</td>
        <td></td>
      </tr>

      <tr id="required-row">
        <td>Required Weight:</td>
        <td id="required-weight">-</td>
        <td id="required-note"></td>
      </tr>
    </table>
  </div>

  <div id="outcome-box"></div>

  <div class="section-label">Climate</div>
  <div class="pair">
    <input type="number" id="climate-x" min="1" step="1">
    <span class="bar">|</span>
    <input type="number" id="climate-y" min="1" step="1">
    <button class="clear-button" onclick="clearClimate()">&times;</button>
  </div>

  <div class="section-label">Weave</div>

  <div id="pairs"></div>

  <script>
    const pairContainer = document.getElementById('pairs');
    const MAX_THREADS = 9;

    function createThreadRow(i) {
      const div = document.createElement('div');
      div.className = 'pair';
      div.id = `row${i}`;
      div.style.display = i === 0 ? "flex" : "none";

      div.innerHTML = `
        <input type="number" id="x${i}" min="1" step="1">
        <span class="bar">|</span>
        <input type="number" id="y${i}" min="1" step="1">
        <button class="clear-button" onclick="clearPair(${i})">&times;</button>
      `;

      pairContainer.appendChild(div);
    }

    for (let i = 0; i < MAX_THREADS; i++) {
      createThreadRow(i);
    }

    function sanitiseInput(id) {
      const el = document.getElementById(id);
      let v = el.value;
      if (v === "") return;
      v = v.replace(/\D/g, "");
      if (v === "0") v = "";
      el.value = v;
    }

    document.addEventListener("input", () => {
      sanitiseInput("climate-x");
      sanitiseInput("climate-y");

      for (let i = 0; i < MAX_THREADS; i++) {
        sanitiseInput(`x${i}`);
        sanitiseInput(`y${i}`);
      }

      updateResults();
    });

    function revealNextRow() {
      for (let i = 0; i < MAX_THREADS - 1; i++) {
        const x = document.getElementById(`x${i}`).value;
        const y = document.getElementById(`y${i}`).value;

        if ((x !== "" || y !== "") && document.getElementById(`row${i+1}`).style.display === "none") {
          document.getElementById(`row${i+1}`).style.display = "flex";
          break;
        }
      }
    }

    function updateResults() {
      revealNextRow();

      let fibres = 0;
      let snags = 0;
      let threadWeights = [];
      let threadMap = [];

      // Climate
      const cx = parseInt(document.getElementById("climate-x").value);
      const cy = parseInt(document.getElementById("climate-y").value);
      if (!isNaN(cx)) fibres += cx;
      if (!isNaN(cy)) snags += cy;

      // Threads
      for (let i = 0; i < MAX_THREADS; i++) {
        const x = parseInt(document.getElementById(`x${i}`).value);
        const y = parseInt(document.getElementById(`y${i}`).value);

        let f = 0, s = 0;
        if (!isNaN(x)) f += x;
        if (!isNaN(y)) s += y;

        const w = f + s;

        if (w > 0) {
          threadWeights.push(w);
          threadMap.push({ index: i, weight: w });
          fibres += f;
          snags += s;
        }
      }

      const weaveTension = fibres - snags;
      const weaveWeight = fibres + snags;

      document.getElementById("tension-value").textContent =
        fibres + snags > 0 ? (weaveTension > 0 ? "+" + weaveTension : weaveTension) : "-";

      document.getElementById("weight-value").textContent =
        fibres + snags > 0 ? weaveWeight : "-";

      // Clear previous highlighting
      for (let i = 0; i < MAX_THREADS; i++) {
        document.getElementById(`x${i}`).classList.remove("heaviest");
        document.getElementById(`y${i}`).classList.remove("heaviest");
      }

      if (threadWeights.length === 0) {
        document.getElementById("required-weight").textContent = "-";
        document.getElementById("outcome-box").textContent = "";
        return;
      }

      // Determine how many to highlight
      let highlightCount = 1;
      if (threadWeights.length >= 4 && threadWeights.length <= 6) highlightCount = 2;
      if (threadWeights.length >= 7) highlightCount = 3;

      // Sort threadMap by weight DESC but preserve original index order for ties
      threadMap.sort((a, b) => b.weight - a.weight || a.index - b.index);

      // Highlight the first N heaviest
      for (let i = 0; i < highlightCount && i < threadMap.length; i++) {
        const idx = threadMap[i].index;
        document.getElementById(`x${idx}`).classList.add("heaviest");
        document.getElementById(`y${idx}`).classList.add("heaviest");
      }

      // Required Weight
      threadWeights.sort((a, b) => b - a);

      const count = threadWeights.length;
      let required = 0;
      let snagsNeeded = 0;

      if (count <= 3) {
        required = 2 * threadWeights[0];
        snagsNeeded = 1;
      } else if (count <= 6) {
        required = 2 * (threadWeights[0] + threadWeights[1]);
        snagsNeeded = 2;
      } else {
        required = 2 * (threadWeights[0] + threadWeights[1] + threadWeights[2]);
        snagsNeeded = 3;
      }

      document.getElementById("required-weight").textContent = required;

      // Colour coding
      const row = document.getElementById("required-row");
      row.classList.remove("req-red", "req-black", "req-green");

      if (required > weaveWeight) {
        row.classList.add("req-red");
      } else if (required === weaveWeight) {
        row.classList.add("req-black");
      } else {
        row.classList.add("req-green");
      }

      // Outcome box
      const box = document.getElementById("outcome-box");
      box.className = row.className;

      if (required > weaveWeight) {
        box.textContent = `Knot: –1 to +1 OR +Snags: ${snagsNeeded}`;
      } else {
        box.textContent = `Knot: 0`;
      }
    }

    function clearPair(i) {
      document.getElementById(`x${i}`).value = "";
      document.getElementById(`y${i}`).value = "";
      updateResults();
    }

    function clearClimate() {
      document.getElementById("climate-x").value = "";
      document.getElementById("climate-y").value = "";
      updateResults();
    }
  </script>
</body>
</html>
