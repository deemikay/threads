<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads: Weave Calculator</title>
  <style>
    body {
      font-family: sans-serif;
      font-size: 18px;
      padding: 20px;
      margin: 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    input {
      width: 4ch;
      margin: 5px;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
    }
    .pair {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bar {
      font-weight: bold;
      font-size: 20px;
      color: #444;
    }
    .clear-button {
      font-size: 18px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 0 6px;
    }
    h2 {
      font-size: 24px;
      text-align: center;
    }
    .section-label {
      font-weight: bold;
      margin-top: 25px;
      margin-bottom: 10px;
      text-align: center;
    }
    #results table {
      width: 100%;
      border-collapse: collapse;
      margin-left: 1em;
    }
    #results td {
      padding: 4px 8px;
      vertical-align: top;
    }
    .rightcell {
      font-style: italic;
      color: #222;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h2>Weave Calculator</h2>

  <div id="results">
    <table>
      <tr>
        <td>Total Weight:</td>
        <td id="total-weight">-</td>
        <td></td>
      </tr>

      <tr>
        <td>Required:</td>
        <td id="required-weight">-</td>
        <td id="required-note" class="rightcell"></td>
      </tr>

      <tr>
        <td>Outcome:</td>
        <td id="outcome-value">-</td>
        <td id="outcome-note" class="rightcell"></td>
      </tr>
    </table>
  </div>

  <div id="pairs"></div>

  <script>
    const pairContainer = document.getElementById('pairs');

    // 9 possible threads (3 rows of 3)
    const labels = [
      { name: "Threads", count: 9 }
    ];

    let pairIndex = 0;

    labels.forEach(section => {
      const sectionLabel = document.createElement('div');
      sectionLabel.className = 'section-label';
      sectionLabel.innerText = section.name;
      pairContainer.appendChild(sectionLabel);

      for (let i = 0; i < section.count; i++) {
        const div = document.createElement('div');
        div.className = 'pair';
        div.innerHTML = `
          <input type="number" id="x${pairIndex}">
          <span class="bar">|</span>
          <input type="number" id="y${pairIndex}">
          <button class="clear-button" onclick="clearPair(${pairIndex})">&times;</button>`;
        pairContainer.appendChild(div);
        pairIndex++;
      }
    });

    function updateResults() {
      let totalWeight = 0;
      let threadWeights = [];

      // Collect all 9 thread weights
      for (let i = 0; i < 9; i++) {
        const x = parseFloat(document.getElementById(`x${i}`).value);
        const y = parseFloat(document.getElementById(`y${i}`).value);

        let w = 0;
        if (!isNaN(x)) w += x;
        if (!isNaN(y)) w += y;

        if (w > 0) {
          threadWeights.push(w);
          totalWeight += w;
        }
      }

      document.getElementById("total-weight").textContent =
        threadWeights.length > 0 ? totalWeight : "-";

      if (threadWeights.length === 0) {
        document.getElementById("required-weight").textContent = "-";
        document.getElementById("outcome-value").textContent = "-";
        document.getElementById("outcome-note").textContent = "";
        return;
      }

      // Sort descending
      threadWeights.sort((a, b) => b - a);

      const count = threadWeights.length;
      let required = 0;
      let snags = 0;

      // Apply new rules
      if (count >= 1 && count <= 3) {
        required = 2 * threadWeights[0];
        snags = 1;
      } else if (count >= 4 && count <= 6) {
        required = 2 * (threadWeights[0] + threadWeights[1]);
        snags = 2;
      } else if (count >= 7 && count <= 9) {
        required = 2 * (threadWeights[0] + threadWeights[1] + threadWeights[2]);
        snags = 3;
      }

      document.getElementById("required-weight").textContent = required;

      // Compare
      if (totalWeight >= required) {
        document.getElementById("outcome-value").textContent = "Surplus";
        document.getElementById("outcome-note").textContent = "Knot Range = 0";
      } else {
        document.getElementById("outcome-value").textContent = "Shortfall";
        document.getElementById("outcome-note").textContent =
          `Choose:\n• Knot Range = –1, 0, +1\n• Add Snags: ${snags}`;
      }
    }

    function clearPair(index) {
      document.getElementById(`x${index}`).value = "";
      document.getElementById(`y${index}`).value = "";
      updateResults();
    }

    document.addEventListener('input', updateResults);
  </script>
</body>
</html>
