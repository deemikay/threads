<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads: Weave Calculator</title>
  <style>
    body {
      font-family: sans-serif;
      font-size: 18px;
      padding: 20px;
      margin: 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    input {
      width: 4ch;
      margin: 5px;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
    }
    .pair {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bar {
      font-weight: bold;
      font-size: 20px;
      color: #444;
    }
    .clear-button {
      font-size: 18px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 0 6px;
    }
    h2 {
      font-size: 24px;
      text-align: center;
    }
    .section-label {
      font-weight: bold;
      margin-top: 25px;
      margin-bottom: 10px;
      text-align: center;
    }
    #results table {
      width: 100%;
      border-collapse: collapse;
      margin-left: 1em;
    }
    #results td {
      padding: 4px 8px;
      vertical-align: top;
    }
    .rightcell {
      font-style: italic;
      color: #222;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h2>Weave Calculator</h2>

  <div id="results">
    <table>
      <tr>
        <td>Total Weight:</td>
        <td id="total-weight">-</td>
        <td></td>
      </tr>

      <tr>
        <td>Required:</td>
        <td id="required-weight">-</td>
        <td id="required-note" class="rightcell"></td>
      </tr>

      <tr>
        <td>Outcome:</td>
        <td id="outcome-value">-</td>
        <td id="outcome-note" class="rightcell"></td>
      </tr>
    </table>
  </div>

  <!-- CLIMATE SECTION -->
  <div class="section-label">Climate</div>
  <div class="pair">
    <input type="number" id="climate-x">
    <span class="bar">|</span>
    <input type="number" id="climate-y">
    <button class="clear-button" onclick="clearClimate()">&times;</button>
  </div>

  <!-- THREADS SECTION -->
  <div id="pairs"></div>

  <script>
    const pairContainer = document.getElementById('pairs');

    // We allow up to 9 threads, but only show them progressively
    const MAX_THREADS = 9;

    function createThreadRow(i) {
      const div = document.createElement('div');
      div.className = 'pair';
      div.id = `row${i}`;
      div.style.display = i === 0 ? "flex" : "none"; // only first visible

      div.innerHTML = `
        <input type="number" id="x${i}">
        <span class="bar">|</span>
        <input type="number" id="y${i}">
        <button class="clear-button" onclick="clearPair(${i})">&times;</button>
      `;

      pairContainer.appendChild(div);
    }

    // Build all rows (hidden except first)
    for (let i = 0; i < MAX_THREADS; i++) {
      createThreadRow(i);
    }

    function revealNextRow() {
      for (let i = 0; i < MAX_THREADS - 1; i++) {
        const x = document.getElementById(`x${i}`).value;
        const y = document.getElementById(`y${i}`).value;

        if ((x !== "" || y !== "") && document.getElementById(`row${i+1}`).style.display === "none") {
          document.getElementById(`row${i+1}`).style.display = "flex";
          break;
        }
      }
    }

    function updateResults() {
      revealNextRow();

      let totalWeight = 0;
      let threadWeights = [];

      // Climate weight (added to total only)
      const cx = parseFloat(document.getElementById("climate-x").value);
      const cy = parseFloat(document.getElementById("climate-y").value);
      let climateWeight = 0;
      if (!isNaN(cx)) climateWeight += cx;
      if (!isNaN(cy)) climateWeight += cy;

      // Collect thread weights
      for (let i = 0; i < MAX_THREADS; i++) {
        const x = parseFloat(document.getElementById(`x${i}`).value);
        const y = parseFloat(document.getElementById(`y${i}`).value);

        let w = 0;
        if (!isNaN(x)) w += x;
        if (!isNaN(y)) w += y;

        if (w > 0) {
          threadWeights.push(w);
          totalWeight += w;
        }
      }

      // Add climate to total
      totalWeight += climateWeight;

      document.getElementById("total-weight").textContent =
        threadWeights.length > 0 || climateWeight > 0 ? totalWeight : "-";

      if (threadWeights.length === 0) {
        document.getElementById("required-weight").textContent = "-";
        document.getElementById("outcome-value").textContent = "-";
        document.getElementById("outcome-note").textContent = "";
        return;
      }

      // Sort threads by weight
      threadWeights.sort((a, b) => b - a);

      const count = threadWeights.length;
      let required = 0;
      let snags = 0;

      // Required Weight rules
      if (count >= 1 && count <= 3) {
        required = 2 * threadWeights[0];
        snags = 1;
      } else if (count >= 4 && count <= 6) {
        required = 2 * (threadWeights[0] + threadWeights[1]);
        snags = 2;
      } else if (count >= 7 && count <= 9) {
        required = 2 * (threadWeights[0] + threadWeights[1] + threadWeights[2]);
        snags = 3;
      }

      document.getElementById("required-weight").textContent = required;

      // Outcome
      if (totalWeight >= required) {
        document.getElementById("outcome-value").textContent = "Surplus";
        document.getElementById("outcome-note").textContent = "Knot Range = 0";
      } else {
        document.getElementById("outcome-value").textContent = "Shortfall";
        document.getElementById("outcome-note").textContent =
          `Choose:\n• Knot Range = –1, 0, +1\n• Add Snags: ${snags}`;
      }
    }

    function clearPair(i) {
      document.getElementById(`x${i}`).value = "";
      document.getElementById(`y${i}`).value = "";
      updateResults();
    }

    function clearClimate() {
      document.getElementById("climate-x").value = "";
      document.getElementById("climate-y").value = "";
      updateResults();
    }

    document.addEventListener('input', updateResults);
  </script>
</body>
</html>
